<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.pillar { display:grid; grid-template-columns: auto 1fr; column-gap: 24px; row-gap: 8px; padding-top: 20px; border-top: 1px solid var(--ink-faint); }
.bignum { grid-row: span 3; font-family: var(--serif); font-style: italic; font-size: 56px; line-height: 1; color: var(--apricot); letter-spacing: -0.02em; }
.tag { font-family: var(--structure); font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--apricot); align-self: end; }
.pillar h3 { font-family: var(--serif); font-weight: 400; font-size: 22px; line-height: 1.18; margin: 0; }
.pillar p { font-family: var(--body); font-size: 13px; line-height: 1.65; color: var(--ink-soft); margin: 0; }
</style></head>
<body><div class="card">
  <article class="pillar">
    <span class="bignum">01</span>
    <span class="tag">Category</span>
    <h3>What's actually moving on shelf.</h3>
    <p>What's selling, what's being quietly delisted, where the gaps sit. Across non-alc, wine, spirits, RTD, beer and functional.</p>
  </article>
  <span class="mono-label">Pillar · serif italic numeral + Inter label + serif H3 + Inter body · hairline top rule</span>
</div></body></html>
