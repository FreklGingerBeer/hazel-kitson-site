<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.row3 { display:grid; grid-template-columns: 60px 1fr 90px; gap: 16px; align-items:center; padding: 10px 0; border-top: 1px solid var(--ink-faint); }
.bar { height: 14px; background: var(--ink); }
.tag { font-family: var(--structure); font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--ink); }
.px { font-family: var(--body); font-size: 12px; color: var(--ink-soft); text-align: right; }
</style></head>
<body><div class="card" style="gap:0">
  <div class="row3"><span class="tag">s-1</span><div class="bar" style="width:4px"></div><span class="px">4 px</span></div>
  <div class="row3"><span class="tag">s-2</span><div class="bar" style="width:8px"></div><span class="px">8 px</span></div>
  <div class="row3"><span class="tag">s-3</span><div class="bar" style="width:12px"></div><span class="px">12 px</span></div>
  <div class="row3"><span class="tag">s-4</span><div class="bar" style="width:16px"></div><span class="px">16 px</span></div>
  <div class="row3"><span class="tag">s-5</span><div class="bar" style="width:24px"></div><span class="px">24 px</span></div>
  <div class="row3"><span class="tag">s-6</span><div class="bar" style="width:32px"></div><span class="px">32 px</span></div>
  <div class="row3"><span class="tag">s-7</span><div class="bar" style="width:48px"></div><span class="px">48 px</span></div>
  <div class="row3"><span class="tag">s-8</span><div class="bar" style="width:72px"></div><span class="px">72 px</span></div>
  <div class="row3" style="border-bottom: 1px solid var(--ink-faint)"><span class="tag">s-9</span><div class="bar" style="width:120px"></div><span class="px">120 px</span></div>
</div></body></html>
