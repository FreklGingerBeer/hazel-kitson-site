<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.demo { display:grid; grid-template-columns: 1fr 1fr; gap:24px; }
.box { background: var(--bone-warm); padding: 20px; }
.btn-flat {
  display:inline-block; padding: 14px 26px; background: var(--apricot); color: var(--bone);
  font-family: var(--structure); font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
  border-radius: 999px; box-shadow: 0 4px 0 rgba(42,42,40,0.15);
}
.btn-flat.hov { box-shadow: 0 8px 0 rgba(42,42,40,0.18); background: var(--apricot-dark); transform: translateY(-2px); }
.rule { height: 1px; background: var(--ink-faint); margin: 16px 0; }
.rule-tan { height: 3px; width: 80px; background: var(--apricot); }
.nav-look { background: rgba(250,241,230,0.92); backdrop-filter: blur(14px); padding: 14px 18px; box-shadow: 0 1px 0 var(--ink-faint); border:1px solid var(--ink-faint); font-family: var(--serif); }
</style></head>
<body><div class="card">
  <div class="demo">
    <div class="col">
      <span class="mono-label">Flat offset shadow · rest</span>
      <div><span class="btn-flat">Get in touch →</span></div>
    </div>
    <div class="col">
      <span class="mono-label">Flat offset shadow · hover</span>
      <div><span class="btn-flat hov">Get in touch →</span></div>
    </div>
  </div>
  <div class="demo">
    <div class="col">
      <span class="mono-label">Hairline rule · 1px ink-faint</span>
      <div class="rule"></div>
    </div>
    <div class="col">
      <span class="mono-label">Eyebrow rule · 1px×36 apricot · Top accent 3px×80 apricot</span>
      <div class="rule-tan"></div>
    </div>
  </div>
  <div class="col">
    <span class="mono-label">Navbar scrolled · bone 0.92 + blur(14) saturate(1.2) + 1px hairline</span>
    <div class="nav-look">Hazel Kitson</div>
  </div>
</div></body></html>
