<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.hero {
  position: relative; min-height: 100%;
  background: url('../assets/hero-grapefruit-coral.jpg') center/cover;
  padding: 28px 32px;
  display:flex; flex-direction:column; justify-content: space-between; gap: 24px;
}
.hero::after {
  content:""; position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 25% 50%, rgba(250, 241, 230, 0.22) 0%, rgba(250, 241, 230, 0) 55%),
    linear-gradient(180deg, rgba(0, 0, 0, 0) 70%, rgba(42, 42, 40, 0.18) 100%);
  pointer-events:none;
}
.hero > * { position: relative; z-index: 1; }
.top { display:flex; justify-content:space-between; align-items: flex-start; }
.eb { font-family: var(--structure); font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink); display:inline-flex; align-items:center; gap:14px; }
.eb::before { content:""; width:36px; height:1px; background: currentColor; }
.meta { font-family: var(--structure); font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink); opacity:0.6; }
.wm { font-family: var(--display); font-size: 84px; line-height: 0.94; color: var(--ink); transform: rotate(-3deg); display:inline-block; transform-origin: 4% center; text-shadow: 0 3px 0 rgba(255,255,255,0.22); }
.lede { font-family: var(--serif); font-style: italic; font-size: 22px; line-height: 1.3; color: var(--ink); max-width: 22ch; margin: 0; display: block; }
</style></head>
<body><div class="card" style="padding:0">
  <div class="hero">
    <div class="top">
      <span class="eb">A Food &amp; Beverage NPD Consultancy</span>
      <span class="meta">Newcastle, AU · Est. 2026</span>
    </div>
    <div>
      <span class="wm">No problem,<br>darling.</span>
      <div style="height:14px"></div>
      <span class="lede">Concept, recipe, packaging, production — the bits between an idea and a real shelf.</span>
    </div>
  </div>
</div></body></html>
