<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.cards { display:grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.way {
  background: var(--bone-warm); border: 1px solid var(--ink-faint);
  padding: 24px 22px; display:flex; flex-direction:column; gap:10px; position:relative;
}
.way::before { content:""; position:absolute; top:0; left:0; height:3px; background: var(--apricot); }
.way.rest::before { width: 0; }
.way.hover::before { width: 100%; }
.way.hover { border-color: var(--apricot); background: var(--bone); transform: translateY(-4px); }
.way.featured { background: var(--ink); color: var(--bone); border-color: var(--ink); transform: translateY(-8px); }
.way.featured::before { width: 100%; }
.way-num { font-family: var(--structure); font-size:11px; letter-spacing:0.3em; text-transform:uppercase; color: var(--apricot); }
.way h3 { font-family: var(--serif); font-weight: 400; font-size: 22px; margin:0; }
.way.featured h3 { color: var(--bone); }
.way p { font-family: var(--body); font-size: 13px; line-height: 1.6; margin:0; color: var(--ink-soft); }
.way.featured p { color: rgba(250,241,230,0.85); }
.flag { position:absolute; top:14px; right:14px; font-family: var(--structure); font-size:10px; letter-spacing:0.24em; text-transform:uppercase; color: var(--ink); background: var(--peach); padding:5px 10px; border-radius:999px; }
</style></head>
<body><div class="card">
  <div class="cards">
    <article class="way rest">
      <span class="way-num">— 01 Project</span>
      <h3>Defined work, defined outcome.</h3>
      <p>Recipe development, packaging, production scheduling, launch.</p>
    </article>
    <article class="way featured">
      <span class="flag">Most signed</span>
      <span class="way-num">— 02 Retainer</span>
      <h3>One day a week, ongoing.</h3>
      <p>Supplier relationships, market shifts, formulations to review.</p>
    </article>
  </div>
  <span class="mono-label">Service tile · Rest (left) vs Featured (right, ink + lifted)</span>
</div></body></html>
