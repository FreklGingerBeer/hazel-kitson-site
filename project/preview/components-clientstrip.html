<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.strip { background: var(--ink); color: var(--bone); padding: 22px 24px; display:flex; align-items:center; gap:28px; flex-wrap:wrap; }
.lbl { font-family: var(--structure); font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; color: rgba(250,241,230,0.55); }
.list { display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
.cn { font-family: var(--structure); font-size: 16px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--apricot); }
.dot { color: rgba(250,241,230,0.3); font-size: 18px; line-height:1; }
</style></head>
<body><div class="card" style="padding:0; justify-content:center">
  <div class="strip">
    <span class="lbl">Worked with</span>
    <div class="list">
      <span class="cn">Frekl Drinks</span><span class="dot">·</span>
      <span class="cn">Posca Hydrate</span><span class="dot">·</span>
      <span class="cn">Sofi Trading</span><span class="dot">·</span>
      <span class="cn">Smooch</span><span class="dot">·</span>
      <span class="cn">Kippis</span>
    </div>
  </div>
  <div style="padding: 12px 24px"><span class="mono-label">Client strip · ink band · Inter 500 16/0.16em apricot names · U+00B7 middle-dot bullet</span></div>
</div></body></html>
